<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- Chudi (churidar suit) -->
  <!-- Kameez top -->
  <rect x="28" y="18" width="44" height="50" rx="4" fill="#805500"/>
  <!-- Collar V-neck -->
  <polygon points="44,18 50,30 56,18" fill="#6b4700"/>
  <!-- Left sleeve -->
  <rect x="14" y="20" width="16" height="32" rx="5" fill="#805500"/>
  <!-- Right sleeve -->
  <rect x="70" y="20" width="16" height="32" rx="5" fill="#805500"/>
  <!-- Embroidery band bottom of kameez -->
  <rect x="28" y="62" width="44" height="5" rx="2" fill="#c88a00"/>
  <!-- Dupatta hint -->
  <path d="M14 22 Q20 50 18 68" stroke="#a06800" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Churidar left leg -->
  <rect x="32" y="66" width="15" height="46" rx="5" fill="#5d3a00"/>
  <!-- Churidar right leg -->
  <rect x="53" y="66" width="15" height="46" rx="5" fill="#5d3a00"/>
  <!-- Gathering at ankle -->
  <ellipse cx="39" cy="110" rx="8" ry="3" fill="#4a2d00"/>
  <ellipse cx="60" cy="110" rx="8" ry="3" fill="#4a2d00"/>
</svg>
